<!DOCTYPE html>
<h1>Add New Book</h1>
<form method="POST">
    <h3>Author Name:</h3>
    <input type="text" name="author_name" required>

    <h3>Book Title:</h3>
    <input type="text" name="title" required><br>
    
    <h3> Publication Year:</h3>
    <input type="number" name="pub_year" required><br><br>

    <button type="submit">Save</button>
</form>
